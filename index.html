<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness App - FIX</title>
    <style>
        :root { --bg-color: #f4f4f9; --card-bg: #ffffff; --border: 2px solid #000; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card-bg); padding: 40px; border: var(--border); box-shadow: 8px 8px 0px #000; width: 100%; max-width: 350px; }
        .hidden { display: none !important; }
        h1 { margin: 0 0 10px 0; text-transform: uppercase; font-size: 24px; }
        p { margin-bottom: 20px; color: #666; font-size: 14px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        input { width: 100%; padding: 12px; border: var(--border); box-sizing: border-box; margin-bottom: 15px; outline: none; }
        button { width: 100%; padding: 12px; background: #000; color: #fff; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .auth-footer { margin-top: 20px; text-align: center; font-size: 14px; }
        .toggle-link { text-decoration: underline; cursor: pointer; font-weight: bold; color: #0000ff; }
        .workout-item { padding: 10px; border-bottom: 1px dashed #000; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="auth-section" class="container">
        <h1 id="main-title">Vítej zpět</h1>
        <p id="main-subtitle">Zadej své údaje pro přístup k deníku</p>

        <form id="auth-form">
            <label>Email</label>
            <input type="email" id="email" placeholder="email@seznam.cz" required>
            <label>Heslo</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="submit" id="submit-btn">Přihlásit se</button>
        </form>

        <div class="auth-footer">
            <span id="footer-text">Nemáš účet?</span> 
            <span class="toggle-link" id="switch-link">Zaregistruj se</span>
        </div>
    </div>

    <div id="app-section" class="container hidden">
        <h1>Můj Trénink 💪</h1>
        <form id="workout-form">
            <input type="text" id="ex" placeholder="Cvik" required>
            <input type="number" id="w" placeholder="Váha (kg)" required>
            <input type="number" id="r" placeholder="Opakování" required>
            <button type="submit">Uložit</button>
        </form>
        <div id="list" style="margin-top:20px"></div>
        <button onclick="location.reload()" style="margin-top:20px; background:red">Odhlásit</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://oesygfqnrykzkmxuggxr.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lc3lnZnFucnlremtteHVnZ3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzOTI4NDMsImV4cCI6MjA4ODk2ODg0M30.VCzB_jf3aeP89wQhwIXxROxF8cVzlNWtNPO8nI0im6M";
        const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLogin = true;

        // FUNKCE PŘEPÍNÁNÍ (Teď přes ID, ne přes onclick v HTML)
        document.getElementById('switch-link').addEventListener('click', () => {
            isLogin = !isLogin;
            const title = document.getElementById('main-title');
            const sub = document.getElementById('main-subtitle');
            const btn = document.getElementById('submit-btn');
            const fText = document.getElementById('footer-text');
            const fLink = document.getElementById('switch-link');

            if (isLogin) {
                title.innerText = "Vítej zpět";
                sub.innerText = "Zadej své údaje pro přístup k deníku";
                btn.innerText = "Přihlásit se";
                fText.innerText = "Nemáš účet?";
                fLink.innerText = "Zaregistruj se";
            } else {
                title.innerText = "Nový účet";
                sub.innerText = "Začni svou cestu za lepším já";
                btn.innerText = "Vytvořit účet";
                fText.innerText = "Už máš účet?";
                fLink.innerText = "Přihlas se";
            }
        });

        // AUTH LOGIKA
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (isLogin) {
                const { data, error } = await _sb.auth.signInWithPassword({ email, password });
                if (error) alert(error.message); else showApp();
            } else {
                const { error } = await _sb.auth.signUp({ email, password });
                if (error) alert(error.message); else alert("Registrace OK! Pokud jsi v Supabase vypnul Confirm Email, můžeš se hned přihlásit.");
            }
        });

        async function showApp() {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            loadData();
        }

        async function loadData() {
            const { data } = await _sb.from('workouts').select('*').order('created_at', {ascending: false});
            const list = document.getElementById('list');
            list.innerHTML = '';
            if (data) data.forEach(i => {
                list.innerHTML += `<div class="workout-item"><b>${i.exercise}</b> <span>${i.weight}kg x ${i.reps}</span></div>`;
            });
        }

        document.getElementById('workout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            await _sb.from('workouts').insert([{ 
                exercise: document.getElementById('ex').value, 
                weight: document.getElementById('w').value, 
                reps: document.getElementById('r').value 
            }]);
            document.getElementById('workout-form').reset();
            loadData();
        });
    </script>
</body>
</html>
