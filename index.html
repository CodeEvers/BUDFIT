<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness App - Tvůj Deník</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-color: #2d3436;
            --accent-color: #000000;
            --border-style: 2px solid #000000;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card-bg); padding: 30px; border: var(--border-style); box-shadow: 8px 8px 0px #000; width: 100%; max-width: 400px; margin: 20px; }
        
        h1 { margin: 0 0 10px 0; font-size: 22px; text-transform: uppercase; }
        .hidden { display: none !important; }

        input { width: 100%; padding: 10px; border: var(--border-style); box-sizing: border-box; outline: none; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background: var(--accent-color); color: white; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        button:disabled { background: #ccc; }

        .auth-footer { margin-top: 20px; text-align: center; font-size: 14px; }
        .toggle-link { text-decoration: underline; cursor: pointer; font-weight: bold; color: #0984e3; }

        /* Styl pro záznamy tréninku */
        .workout-item { border-bottom: 1px dashed #000; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="auth-section" class="container">
        <h1 id="auth-title">Vítej zpět</h1>
        <p id="auth-subtitle">Zadej údaje pro vstup do deníku</p>

        <form id="auth-form">
            <input type="email" id="email" required placeholder="Email">
            <input type="password" id="password" required placeholder="Heslo">
            <button type="submit" id="auth-btn">Přihlásit se</button>
        </form>

        <div class="auth-footer">
            <div id="login-text">Nemáš účet? <span class="toggle-link" onclick="toggleAuth()">Zaregistruj se</span></div>
            <div id="register-text" class="hidden">Už máš účet? <span class="toggle-link" onclick="toggleAuth()">Přihlas se</span></div>
        </div>
    </div>

    <div id="app-section" class="container hidden">
        <h1>Můj Trénink 💪</h1>
        <p id="user-email" style="font-size: 12px; color: gray;"></p>
        
        <form id="workout-form">
            <input type="text" id="exercise" placeholder="Cvik (např. Dřep)" required>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="weight" placeholder="Váha (kg)" required>
                <input type="number" id="reps" placeholder="Opakování" required>
            </div>
            <button type="submit">Uložit cvik</button>
        </form>

        <div id="workout-list" style="margin-top: 20px;">
            <h3>Dnešní záznamy:</h3>
            </div>

        <button onclick="handleLogout()" style="margin-top: 30px; background: #ff4757;">Odhlásit se</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // TVOJE KONFIGURACE
        const SUPABASE_URL = "https://oesygfqnrykzkmxuggxr.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9lc3lnZnFucnlremtteHVnZ3hyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzOTI4NDMsImV4cCI6MjA4ODk2ODg0M30.VCzB_jf3aeP89wQhwIXxROxF8cVzlNWtNPO8nI0im6M";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isLoginMode = true;

        // PŘEPÍNÁNÍ LOGIN / REGISTRACE
        function toggleAuth() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').innerText = isLoginMode ? "Vítej zpět" : "Nový účet";
            document.getElementById('auth-btn').innerText = isLoginMode ? "Přihlásit se" : "Vytvořit účet";
            document.getElementById('login-text').classList.toggle('hidden');
            document.getElementById('register-text').classList.toggle('hidden');
        }

        // AUTENTIZACE
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            let result;
            if (isLoginMode) {
                result = await supabaseClient.auth.signInWithPassword({ email, password });
            } else {
                result = await supabaseClient.auth.signUp({ email, password });
                if (!result.error) alert("Registrace úspěšná! Potvrď email.");
            }

            if (result.error) alert(result.error.message);
            else if (isLoginMode) showApp(result.data.user);
        });

        // ZOBRAZENÍ APP
        function showApp(user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;
            loadWorkouts();
        }

        // NAČTENÍ TRÉNINKŮ
        async function loadWorkouts() {
            const { data, error } = await supabaseClient.from('workouts').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('workout-list');
            list.innerHTML = '<h3>Dnešní záznamy:</h3>';
            if (data) {
                data.forEach(item => {
                    list.innerHTML += `<div class="workout-item"><span>${item.exercise}</span> <b>${item.weight}kg x ${item.reps}</b></div>`;
                });
            }
        }

        // ULOŽENÍ TRÉNINKU
        document.getElementById('workout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const exercise = document.getElementById('exercise').value;
            const weight = document.getElementById('weight').value;
            const reps = document.getElementById('reps').value;

            const { error } = await supabaseClient.from('workouts').insert([{ exercise, weight, reps }]);
            
            if (error) alert(error.message);
            else {
                document.getElementById('workout-form').reset();
                loadWorkouts();
            }
        });

        // ODHLÁŠENÍ
        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
