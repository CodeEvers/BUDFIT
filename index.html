<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness App - Vstup</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-card">
        <h1 id="auth-title">Vítej zpět</h1>
        <p id="auth-subtitle">Zadej své údaje pro přístup k deníku</p>

        <form id="auth-form">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="email@seznam.cz">
            </div>
            <div class="input-group">
                <label>Heslo</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" id="submit-btn">Přihlásit se</button>
        </form>

        <div class="auth-footer">
            <div id="login-text">
                Nemáš účet? <span class="toggle-link" onclick="handleToggle()">Zaregistruj se</span>
            </div>
            <div id="register-text" style="display: none;">
                Už máš účet? <span class="toggle-link" onclick="handleToggle()">Přihlas se</span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
